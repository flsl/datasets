<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRC数据集平台(均有偿，白嫖勿扰)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --accent-color: #f093fb;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 20px 50px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            color: white;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.2rem;
        }

        #searchInput {
            width: 100%;
            padding: 18px 25px 18px 65px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            box-shadow: var(--shadow);
            outline: none;
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        #searchInput::placeholder {
            color: #999;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
            font-size: 0.95rem;
        }

        .sort-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sort-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .dataset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .dataset-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .dataset-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--bg-gradient);
        }

        .dataset-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .dataset-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .dataset-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tag {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag.yolo {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .tag.labelme {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .tag.classification {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .dataset-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .category {
            font-size: 0.85rem;
            color: #666;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .download-btn {
            background: var(--bg-gradient);
            color: white;
            padding: 10px 22px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border: none;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .download-btn.disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .download-btn.disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .no-results {
            text-align: center;
            padding: 80px 20px;
            color: white;
        }

        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .no-results p {
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: var(--shadow-hover);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .modal h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .modal p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .wechat-info {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .modal-btn {
            background: var(--bg-gradient);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .stat-item {
                padding: 15px 20px;
            }

            .dataset-grid {
                grid-template-columns: 1fr;
            }

            .dataset-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 FIRC数据集平台(均有偿，白嫖勿扰)</h1>
            <p class="subtitle">探索海量优质数据集，助力您的AI研究与开发</p>
            
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索数据集名称..." />
            </div>
        </header>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">总数据集</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="yoloCount">0</div>
                <div class="stat-label">YOLO格式</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="labelmeCount">0</div>
                <div class="stat-label">Labelme格式</div>
            </div>
        </div>

        <div class="results-info">
            <span id="resultCount">显示 0 个结果</span>
            <button class="sort-btn" id="sortBtn">🔄 切换排序</button>
        </div>

        <div class="dataset-grid" id="datasetGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载数据集中...</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">💬</div>
            <h3>联系获取数据集</h3>
            <p>该数据集暂未提供直接下载链接，请添加微信获取详细信息</p>
            <div class="wechat-info">
                📱 微信：fl176831
            </div>
            <button class="modal-btn" onclick="closeModal()">知道了</button>
        </div>
    </div>

    <script src="datasets.js"></script>
    <script>
        let currentSort = 'asc';

        function getTagClass(format) {
            switch(format) {
                case 'YOLO': return 'tag yolo';
                case 'Labelme': return 'tag labelme';
                case '分类': return 'tag classification';
                default: return 'tag';
            }
        }

        function handleDownload(url) {
            if (url === '#') {
                openModal();
                return false;
            }
            window.open(url, '_blank');
            return false;
        }

        function openModal() {
            document.getElementById('contactModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('contactModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('contactModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        function renderDatasets(data) {
            const grid = document.getElementById('datasetGrid');
            
            if (data.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <h3>😔 未找到匹配的数据集</h3>
                        <p>请尝试其他搜索关键词</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = data.map(item => {
                const hasUrl = item.url !== '#';
                return `
                    <div class="dataset-card">
                        <h3 class="dataset-name">${item.name}</h3>
                        <div class="dataset-tags">
                            <span class="${getTagClass(item.format)}">${item.format}</span>
                            <span class="tag">${item.category}</span>
                        </div>
                        <div class="dataset-info">
                            <span class="category">📁 ${item.category}</span>
                            <button class="download-btn ${hasUrl ? '' : 'disabled'}" onclick="handleDownload('${item.url}')">
                                ⬇️ ${hasUrl ? '下载' : '联系'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const yoloCount = datasets.filter(d => d.format === 'YOLO').length;
            const labelmeCount = datasets.filter(d => d.format === 'Labelme').length;
            
            document.getElementById('totalCount').textContent = datasets.length;
            document.getElementById('yoloCount').textContent = yoloCount;
            document.getElementById('labelmeCount').textContent = labelmeCount;
        }

        function search() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let filtered = datasets;
            
            if (query) {
                filtered = datasets.filter(d => 
                    d.name.toLowerCase().includes(query) ||
                    d.category.toLowerCase().includes(query)
                );
            }

            if (currentSort === 'desc') {
                filtered = [...filtered].reverse();
            }

            document.getElementById('resultCount').textContent = `显示 ${filtered.length} 个结果`;
            renderDatasets(filtered);
        }

        function toggleSort() {
            currentSort = currentSort === 'asc' ? 'desc' : 'asc';
            search();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof datasets !== 'undefined' && datasets.length > 0) {
                updateStats();
                search();
            }
            
            document.getElementById('searchInput').addEventListener('input', search);
            document.getElementById('sortBtn').addEventListener('click', toggleSort);
        });
    </script>
</body>
</html>
